<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1d23;
      color: #e0e0e0;
      padding: 16px;
    }
    h1 {
      font-size: 16px;
      font-weight: 600;
      color: #00AB5F;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    h1 svg { width: 20px; height: 20px; }
    .schedule {
      background: #22262e;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
      font-size: 13px;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 4px 12px;
    }
    .schedule dt { color: #8b8fa3; }
    .schedule dd { color: #e0e0e0; font-weight: 500; }
    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    #fillBtn {
      background: #00AB5F;
      color: #fff;
      margin-bottom: 8px;
    }
    #fillBtn:hover { background: #00954f; }
    #fillBtn:disabled { background: #3a3f4a; color: #6b6f7a; cursor: not-allowed; }
    #clearBtn {
      background: transparent;
      color: #8b8fa3;
      border: 1px solid #3a3f4a;
      margin-bottom: 12px;
      font-size: 12px;
    }
    #clearBtn:hover { background: #2a2e36; color: #e0e0e0; }
    #clearBtn:disabled { opacity: 0.4; cursor: not-allowed; }
    #status {
      background: #22262e;
      border-radius: 6px;
      padding: 10px;
      font-size: 12px;
      line-height: 1.5;
      max-height: 200px;
      overflow-y: auto;
      color: #8b8fa3;
      white-space: pre-wrap;
    }
    .status-ok { color: #00AB5F; }
    .status-error { color: #e74c3c; }
    .status-info { color: #5b9bd5; }
    .footer {
      margin-top: 10px;
      font-size: 11px;
      color: #5a5e6b;
      text-align: center;
    }
    .badge {
      display: inline-block;
      background: #2a2e36;
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 11px;
      color: #8b8fa3;
      margin-left: 4px;
    }
  </style>
</head>
<body>
  <h1>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="10"/>
      <polyline points="12 6 12 12 16 14"/>
    </svg>
    Personio Autofill
  </h1>

  <dl class="schedule">
    <dt>Arbeit 1</dt>
    <dd>09:00 – 12:00</dd>
    <dt>Pause</dt>
    <dd>12:00 – 13:00</dd>
    <dt>Arbeit 2</dt>
    <dd>13:00 – 18:00</dd>
    <dt>Modus</dt>
    <dd>Nur leere Werktage <span class="badge">Mo–Fr</span></dd>
  </dl>

  <div id="summary" style="display:none; background:#22262e; border-radius:6px; padding:8px 12px; margin-bottom:10px; font-size:13px; grid-template-columns:1fr 1fr 1fr; gap:4px; text-align:center;">
    <div><div style="color:#00AB5F; font-size:18px; font-weight:700;" id="sumFilled">0</div><div style="color:#8b8fa3; font-size:11px;">Gefüllt</div></div>
    <div><div style="color:#e0e0e0; font-size:18px; font-weight:700;" id="sumSkipped">0</div><div style="color:#8b8fa3; font-size:11px;">Übersprungen</div></div>
    <div><div style="color:#e0e0e0; font-size:18px; font-weight:700;" id="sumTotal">0</div><div style="color:#8b8fa3; font-size:11px;">Gesamt</div></div>
  </div>

  <button id="fillBtn">
    <span id="btnLabel">📋 Alle leeren Tage füllen</span>
    <span id="spinner" style="display:none">⏳</span>
  </button>
  <button id="clearBtn">🔄 Seite neu laden</button>

  <div id="status">Klicke auf "Alle leeren Tage füllen" um zu starten.</div>
  <div class="footer">Läuft nur auf Personio Monatsansicht</div>

  <script src="popup.js"></script>
</body>
</html>
